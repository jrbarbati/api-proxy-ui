<div class="filter-root">

  <!-- Trigger button -->
  <button class="trigger" [ngClass]="{ active: hasSelection() }" (click)="toggleOpen($event)">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
    </svg>
    <span>{{ selectionLabel() }}</span>
    @if (hasSelection()) {
      <span class="trigger-count">{{ selectedIds().size }}</span>
    }
    <svg class="chevron" [ngClass]="{ rotated: open() }" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </button>

  <!-- Dropdown panel -->
  @if (open()) {
    <div class="panel" (click)="$event.stopPropagation()">

      <!-- Search -->
      <div class="panel-search">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          class="search-input"
          type="text"
          placeholder="Filter routes…"
          [value]="searchQuery()"
          (input)="searchQuery.set($any($event.target).value)"
          (click)="$event.stopPropagation()"
        />
      </div>

      <!-- Actions -->
      <div class="panel-actions">
        <button class="action-btn" (click)="clearAll()">Clear all</button>
        <span class="panel-count">{{ routes().length }} routes</span>
      </div>

      <!-- Route list -->
      <div class="route-list">
        @if (filteredRoutes().length === 0) {
          <p class="empty">No routes match</p>
        }
        @for (route of filteredRoutes(); track route.id) {
          <div class="route-item" [ngClass]="{ selected: isSelected(route.id) }" (click)="toggle(route)">
            <div class="checkbox" [ngClass]="{ checked: isSelected(route.id) }">
              @if (isSelected(route.id)) {
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              }
            </div>
            <span class="method-badge" [ngClass]="'method--' + route.method.toLowerCase()">
              {{ route.method }}
            </span>
            <span class="route-info">
              <span class="route-pattern">{{ route.pattern }}</span>
              <span class="route-url">{{ route.backend_url }}</span>
            </span>
          </div>
        }
      </div>

    </div>
  }

</div>
