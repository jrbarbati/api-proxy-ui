<div class="toast-region" aria-live="polite" aria-label="Notifications">
  @for (toast of toastSvc.toasts(); track toast.id) {
    <div
      class="toast"
      [ngClass]="['toast--' + toast.type, leavingIds().has(toast.id) ? 'leaving' : '']"
      role="alert"
    >
      <!-- Left accent bar -->
      <div class="toast-bar"></div>

      <!-- Icon -->
      <div class="toast-icon">
        @switch (toast.type) {
          @case ('success') {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          }
          @case ('warning') {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          }
          @case ('info') {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
          }
          @case ('error') {
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          }
        }
      </div>

      <!-- Content -->
      <div class="toast-content">
        <p class="toast-title">{{ toast.title }}</p>
        @if (toast.message) {
          <p class="toast-message">{{ toast.message }}</p>
        }
      </div>

      <!-- Dismiss -->
      <button class="toast-dismiss" (click)="dismiss(toast.id)" aria-label="Dismiss">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <!-- Progress bar -->
      <div class="toast-progress" [style.--duration]="toast.duration + 'ms'"></div>
    </div>
  }
</div>
