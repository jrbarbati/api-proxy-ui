<div class="page">
  <div class="page-actions">
    <app-theme-toggle />
  </div>
  <!-- Background layers -->
  <div class="bg-dots"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <main class="container">
    <!-- Branding -->
    <div class="branding">
      <div class="logo-mark">
        <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M14 2L24 2L36 14L36 24L24 36L14 36L2 24L2 14Z" stroke="currentColor" stroke-width="1.25"/>
          <circle cx="19" cy="19" r="2.5" fill="currentColor"/>
          <line x1="19" y1="12" x2="19" y2="14" stroke="currentColor" stroke-width="1.25"/>
          <line x1="19" y1="24" x2="19" y2="26" stroke="currentColor" stroke-width="1.25"/>
          <line x1="12" y1="19" x2="14" y2="19" stroke="currentColor" stroke-width="1.25"/>
          <line x1="24" y1="19" x2="26" y2="19" stroke="currentColor" stroke-width="1.25"/>
        </svg>
      </div>
      <h1 class="logo-text">API PROXY</h1>
      <div class="logo-rule"></div>
      <p class="logo-sub">Admin Console</p>
    </div>

    <!-- Card -->
    <div class="card-enter">
    <div class="card" [ngClass]="{ shake: shaking() }">
      <form (submit)="onSubmit($event)" novalidate>

        <!-- Email field -->
        <div class="field" [ngClass]="{ focused: emailFocused(), filled: email().length > 0 }">
          <label class="field-label" for="email">Email</label>
          <input
            id="email"
            class="field-input"
            type="email"
            autocomplete="email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            (focus)="emailFocused.set(true)"
            (blur)="emailFocused.set(false)"
          />
          <div class="field-line"></div>
        </div>

        <!-- Password field -->
        <div class="field" [ngClass]="{ focused: passwordFocused(), filled: password().length > 0 }">
          <label class="field-label" for="password">Password</label>
          <div class="field-input-row">
            <input
              id="password"
              class="field-input"
              [type]="showPassword() ? 'text' : 'password'"
              autocomplete="current-password"
              [value]="password()"
              (input)="password.set($any($event.target).value)"
              (focus)="passwordFocused.set(true)"
              (blur)="passwordFocused.set(false)"
            />
            <button
              type="button"
              class="eye-btn"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'"
              (click)="togglePassword()"
            >
              @if (showPassword()) {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
          <div class="field-line"></div>
        </div>

        <!-- Error -->
        <div class="error-msg" [ngClass]="{ visible: error().length > 0 }" role="alert">
          {{ error() }}
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit" [ngClass]="{ loading: loading() }" [disabled]="loading()">
          <span class="btn-text">Sign In</span>
          <span class="btn-arrow" aria-hidden="true">→</span>
          <span class="btn-spinner" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </span>
        </button>
      </form>
    </div>
    </div>
  </main>
</div>
